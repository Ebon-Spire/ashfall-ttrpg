name: Feedback & Suggestions
description: Share ideas, suggestions, or general feedback
title: "[Feedback] "
labels: ["feedback"]
body:
  - type: dropdown
    id: category
    attributes:
      label: What area is this about?
      options:
        - Rules & Mechanics
        - Classes & Archetypes
        - Setting & Lore
        - Bestiary & Creatures
        - Website & Tools
        - Balance & Playtesting
        - New Content Request
        - Other
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: Your feedback
      placeholder: What would you like to see changed, added, or improved?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Any extra details, examples, or references that help explain your idea?
